name: Testing YMdantic

on:
  push:
  pull_request:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        check:
          - name: Ruff format
            cmd: ruff format --diff
          - name: Ruff check
            cmd: ruff check ymdantic tests
          - name: Mypy
            cmd: mypy ymdantic tests

    name: "${{ matrix.check.name }} (py${{ matrix.python-version }})"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.17"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install deps
        run: uv sync --locked --all-groups

      - name: Run check
        run: uv run ${{ matrix.check.cmd }}

  test_push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    name: "Pytest push (py${{ matrix.python-version }})"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.17"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install deps
        run: uv sync --locked --all-groups

      - name: Run Pytest
        env:
          YM_TOKEN: ${{ secrets.YM_TOKEN }}
        run: uv run pytest -vv tests

  test_pr_approved:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    environment: pull_requests
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    name: "Pytest PR approved (py${{ matrix.python-version }})"

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.17"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install deps
        run: uv sync --locked --all-groups

      - name: Run Pytest
        env:
          YM_TOKEN: ${{ secrets.YM_TOKEN }}
        run: uv run pytest -vv tests
